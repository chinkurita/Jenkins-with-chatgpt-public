name: continuous intergration one 
on: 
  push: 
    branches: [ main ]
  pull_request: 

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with: 
          node-version: '18'

      - name: install dependency
        run: npm ci

      - name: run test
        run: npm test

      - name: Upload test artifacts
        if: always()
        uses: actions/uplad-artifact@v4
        with:
          name: test-logs
          path: test-results/
